<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elisa Santi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; color: #fff; position: relative;
        }

        /* Background blur */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('profil.png'); background-size: cover;
            background-position: center; z-index: -2; transition: filter 1s ease;
        }
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(100, 149, 237, 0.6); z-index: -1;
        }

        h1 { margin-top: 50px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); opacity: 0; }
        .show-h1 { animation: fadeInDown 1s ease-out forwards; }

        /* Animasi muncul list */
        .social-link {
            display: none; align-items: center; padding: 15px 20px;
            background: rgba(255, 255, 255, 0.9); color: cornflowerblue;
            margin-block: 10px; border-radius: 15px; width: 250px;
            cursor: pointer; transition: 0.3s; font-weight: bold;
            animation: popIn 0.7s ease-out forwards;
        }

        .tompel-btn {
            position: absolute; top: 295px; right: 117px;
            width: 35px; height: 35px; background: rgba(0,0,0,0.0);
            border-radius: 50%; z-index: 10;
        }

        .social-link:hover { transform: scale(1.05); background: white; }
        
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }
    .hint-container {
            position: absolute; top: 270px; right: 90px;
            text-align: center; color: white;
            animation: blink 1.5s infinite;
        }
    .social-link:hover { transform: scale(1.05); background: white; }

.social-link i { margin-right: 15px; font-size: 20px; }
.blur-bg::before { filter: blur(8px); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <h1 id="judul">ELISA SANTI</h1>
<div class="hint-container">
        <i class="fas fa-arrow-down" style="font-size: 30px;"></i>
        <div style="font-size: 12px; font-weight: bold;">Klik tahi lalatku!</div>
    </div>
    <div onclick="window.location.href='https://youtube.com/@elisasanti-m4b'" class="social-link">
        <i class="fab fa-youtube"></i><span>youtube</span>
    </div>
    <div onclick="window.location.href='https://www.instagram.com/elisa_santi015'" class="social-link">
        <i class="fab fa-instagram"></i><span>instagram</span>
    </div>
    <div onclick="window.location.href='https://www.tiktok.com/@elisa.santi015'" class="social-link">
        <i class="fab fa-tiktok"></i><span>tiktok</span>
    </div>
    <div onclick="window.location.href='https://www.facebook.com/profile.php?id=61590931755644'" class="social-link">
        <i class="fab fa-facebook"></i><span>facebook</span>
    </div>
    
    <div class="tompel-btn" onclick="aktivasiEfek()"></div>

   <script>
        function aktivasiEfek() {
            // 1. Tambahin efek blur ke body
            document.body.classList.add('blur-bg');
            
            // 2. Munculin judul
            document.getElementById('judul').classList.add('show-h1');
            
            // 3. Munculin list sosmed
            var links = document.getElementsByClassName('social-link');
            for (var i = 0; i < links.length; i++) {
                links[i].style.display = 'flex';
            }
               document.querySelector('.hint-container').style.display = 'none';
               document.querySelector('.tompel-btn').style.display = 'none';                
        }
    </script>
</body>
</html>
